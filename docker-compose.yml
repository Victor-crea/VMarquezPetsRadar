services:
  db:
    image: postgis/postgis:16-3.4
    container_name: petradar-db
    environment:
      POSTGRES_DB: petradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - petradar_pgdata:/var/lib/postgresql/data

volumes:
  petradar_pgdata:

